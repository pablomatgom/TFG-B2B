name: CI

on:
  workflow_call:

jobs:
  backend:
    name: Backend (lint + tests)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt -r requirements-dev.txt ruff

      - name: Lint (ruff)
        run: ruff check backend/

      - name: Tests (pytest + coverage)
        run: python -m pytest tests/ -v --cov=backend --cov-report=xml --cov-report=term-missing

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: coverage-xml
          path: coverage.xml
          retention-days: 1

  frontend:
    name: Frontend (lint + build)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile
        working-directory: frontend

      - name: Lint (eslint)
        run: pnpm lint
        working-directory: frontend

      - name: Tests (jest + coverage)
        run: pnpm test:ci
        working-directory: frontend

      - name: Upload frontend coverage
        uses: actions/upload-artifact@v4
        with:
          name: frontend-lcov
          path: frontend/coverage/lcov.info
          retention-days: 1

      - name: Type-check & build (next build)
        run: pnpm build
        working-directory: frontend

  sonarcloud:
    name: SonarCloud
    runs-on: ubuntu-latest
    needs: [backend, frontend]

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # required for blame and new-code detection

      - name: Download backend coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-xml

      - name: Download frontend coverage
        uses: actions/download-artifact@v4
        with:
          name: frontend-lcov
          path: frontend/coverage

      - name: SonarCloud Scan
        uses: SonarSource/sonarqube-scan-action@v5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: https://sonarcloud.io