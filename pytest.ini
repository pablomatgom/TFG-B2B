[pytest]
testpaths = tests
pythonpath = .
python_files = test_*.py
python_classes = Test*
python_functions = test_*
addopts = -ra --tb=short --strict-markers
markers =
    unit: pure unit tests, no I/O
    integration: file I/O via tmp_path, no Neo4j
    api: FastAPI TestClient, DB and Neo4j mocked
    e2e: cross-layer wiring
    known_bug: xfail — documents a confirmed defect
