          - 'API Interactiva (Swagger)': 'https://b2b-graph-intelligence.duckdns.org/swagger'
      - 'Pipeline ETL':
          - 'Runners': backend/etl/runners.md
          - 'Sintetizadores':
              - 'Visión General': backend/etl/generation/overview.md
              - 'Empresas': backend/etl/generation/companies.md
              - 'Suministros': backend/etl/generation/supplies.md
              - 'Productos': backend/etl/generation/products.md
              - 'Documentos': backend/etl/generation/documents.md
              - 'Líneas de Documento': backend/etl/generation/contains.md
          - 'Cargador Neo4j': backend/etl/loader.md
          - 'Analítica':
