site_name: "B2B Graph Intel - Manual del Desarrollador"
site_description: "Documentación técnica del sistema completo: frontend Next.js, backend FastAPI, pipeline ETL y algoritmos de grafos (GDS)."
site_url: "https://b2b-graph-intelligence.duckdns.org/docs/"

theme:
  name: material
  palette:
    # Configuración de tema oscuro (Slate) ideal para desarrolladores
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-night
        name: Cambiar a tema claro
    # Opción de tema claro por si el tribunal prefiere leerlo en blanco
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/weather-sunny
        name: Cambiar a tema oscuro
  
  # Características de interfaz avanzadas para mejorar la UX
  features:
    - navigation.top           # Botón flotante para volver arriba
    - search.suggest           # Autocompletado inteligente en la barra de búsqueda
    - search.highlight         # Resalta las palabras buscadas dentro de los textos
    - content.code.copy        # Añade un botón interactivo para copiar bloques de código

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [.]
          options:
            show_source: true         # Permite desplegar el código fuente original desde la web
            heading_level: 3          # Mantiene los métodos en una jerarquía visual limpia (H3)
            docstring_style: google   # Fuerza el estándar de Google para procesar 'Returns:' perfectamente
            show_root_heading: true   # Muestra el nombre de la clase base como título principal
            filters: ["!^__"]         # Muestra métodos privados (_run_gds) pero oculta dunder (__init__, etc.)

markdown_extensions:
  # Extensión necesaria para habilitar fórmulas matemáticas en LaTeX
  - pymdownx.arithmatex:
      generic: true
  # Extensiones para mejorar el resaltado de sintaxis del código de Python/Cypher
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

extra_css:
  - stylesheets/extra.css

# Scripts externos para el renderizado de ecuaciones (MathJax) y diagramas (Mermaid)
extra_javascript:
  - https://cdnjs.cloudflare.com/ajax/libs/mathjax/3.2.2/es5/tex-mml-chtml.js
  - https://unpkg.com/mermaid@11/dist/mermaid.min.js

# Estructura de navegación del sitio web
