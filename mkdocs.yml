              - 'Arquitectura Interna': backend/etl/analytics/architecture.md
              - 'Métricas Macroscópicas': backend/etl/analytics/macro.md
              - 'Analítica de Grafos (GDS)': backend/etl/analytics/gds.md
              - 'Trazabilidad Documental': backend/etl/analytics/traceability.md
