server {
    listen 80;
    server_name b2b-graph-intelligence.duckdns.org;
    return 301 https://$host$request_uri;
}

server {
    listen 443 ssl;
    server_name b2b-graph-intelligence.duckdns.org;

    ssl_certificate     /etc/letsencrypt/live/b2b-graph-intelligence.duckdns.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/b2b-graph-intelligence.duckdns.org/privkey.pem;

    # Auth endpoints
    location /auth/ {
        proxy_pass http://backend:8000/auth/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # All API endpoints
    location /api/ {
        proxy_pass http://backend:8000/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # FastAPI Swagger (movido de /docs a /swagger)
    location /swagger {
        proxy_pass http://backend:8000/swagger;
        proxy_set_header Host $host;
    }
    location /redoc {
        proxy_pass http://backend:8000/redoc;
        proxy_set_header Host $host;
    }
    location /openapi.json {
        proxy_pass http://backend:8000/openapi.json;
        proxy_set_header Host $host;
    }

    # MkDocs documentation
    location /docs {
        proxy_pass http://docs:8000/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # Next.js frontend (everything else)
    location / {
        proxy_pass http://frontend:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
    }
}