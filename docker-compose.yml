services:
  neo4j:
    image: neo4j:5
    container_name: tfg-neo4j
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-AdminUser1234}
      NEO4J_PLUGINS: '["graph-data-science"]'

      # Heap: generous on 12GB Contabo VPS
      NEO4J_server_memory_heap_initial__size: 1G
      NEO4J_server_memory_heap_max__size: 2G

      # Page cache: large for fast graph traversals
      NEO4J_server_memory_pagecache_size: 2G

      # Transaction timeout: generous for pipeline bulk writes
      NEO4J_db_transaction_timeout: 600s

    deploy:
      resources:
        limits:
          memory: 6G
        reservations:
          memory: 4G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tfg-backend
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-AdminUser1234}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      FRONTEND_URL: ${PUBLIC_URL:-http://localhost:3000}
    volumes:
      - ./data:/app/data
    depends_on:
      neo4j:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 1G
        reservations:
          memory: 512M
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/api/health')"]
      interval: 15s
      timeout: 5s
      retries: 5
      start_period: 30s

  pipeline-init:
    profiles: ["pipeline"]
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tfg-pipeline-init
    command: >
      sh -c "python -m backend.main_cli all --clear-db"
    environment:
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-AdminUser1234}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
    volumes:
      - ./data:/app/data
    depends_on:
      neo4j:
        condition: service_healthy
    restart: "no"

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: ${PUBLIC_URL:-http://localhost:8000}
    container_name: tfg-frontend
    environment:
      - HOSTNAME=0.0.0.0
    depends_on:
      backend:
        condition: service_healthy
    deploy:
      resources:
        limits:
          memory: 512M
        reservations:
          memory: 256M
    restart: unless-stopped

  docs:
    image: squidfunk/mkdocs-material
    container_name: tfg-docs
    volumes:
      - .:/docs
    restart: unless-stopped

  nginx:
    image: nginx:alpine
    container_name: tfg-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./certbot/certs:/etc/letsencrypt:ro
    depends_on:
      frontend:
        condition: service_started
      backend:
        condition: service_healthy
      docs:
        condition: service_started
    deploy:
      resources:
        limits:
          memory: 256M
        reservations:
          memory: 128M
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs: