services:
  neo4j:
    image: neo4j:5
    container_name: tfg-neo4j
    ports:
      - "7474:7474"   # Neo4j Browser UI
      - "7687:7687"   # Bolt driver (used by the Python backend)
    environment:
      NEO4J_AUTH: neo4j/${NEO4J_PASSWORD:-AdminUser1234}
      NEO4J_PLUGINS: '["graph-data-science"]'

      # Heap: JVM memory for query processing and transactions
      NEO4J_server_memory_heap_initial__size: 512M
      NEO4J_server_memory_heap_max__size: 1G

      # Page cache: keeps graph data (nodes/rels) hot in memory
      NEO4J_server_memory_pagecache_size: 1G

      # Transaction timeout: surfaces hangs as errors instead of silent freezes
      NEO4J_db_transaction_timeout: 120s

    deploy:
      resources:
        limits:
          memory: 3G
        reservations:
          memory: 2G
    volumes:
      - neo4j_data:/data
      - neo4j_logs:/logs
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:7474"]
      interval: 15s
      timeout: 10s
      retries: 10
      start_period: 60s

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: tfg-backend
    ports:
      - "8000:8000"
    environment:
      # Use the Docker service name "neo4j" instead of localhost
      NEO4J_URI: bolt://neo4j:7687
      NEO4J_USER: ${NEO4J_USER:-neo4j}
      NEO4J_PASSWORD: ${NEO4J_PASSWORD:-AdminUser1234}
      NEO4J_DATABASE: ${NEO4J_DATABASE:-neo4j}
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-change-me-in-production}
      # PUBLIC_HOST controls which origin the backend allows via CORS
      FRONTEND_URL: http://${PUBLIC_HOST:-localhost}:3000
    volumes:
      # Bind-mount data/ so generated files are visible on the host
      # and persist across container rebuilds
      - ./data:/app/data
    depends_on:
      neo4j:
        condition: service_healthy
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # Baked into the Next.js build at image-build time
        NEXT_PUBLIC_API_URL: http://${PUBLIC_HOST:-localhost}:8000
    container_name: tfg-frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  neo4j_data:
  neo4j_logs: